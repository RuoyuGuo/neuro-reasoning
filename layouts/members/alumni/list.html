{{- define "content" -}}
<div style="max-width: 1200px; margin: 2rem auto 5rem auto;">

  <!-- Title -->
  <h2 style="text-align: center; margin-bottom: 2rem;">
    {{ .Title }}
  </h2>

  <!-- Grid of alumni cards -->
  <div style="
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem;
    max-width: 1000px;
    margin: 0 auto;
  ">
    {{ range .Params.alumni }}
      <div style="border: 1px solid #eaeaea; border-radius: 12px; padding: 1rem 1.1rem;">
        <div style="font-weight: 600; font-size: 1.05rem;">
          {{ .name }}
        </div>
        {{ if .note }}
          <div style="margin-top: .25rem; color: #555; font-size: .95rem;">
            {{ .note }}
          </div>
        {{ end }}
      </div>
    {{ end }}
  </div>

</div>
{{- end -}}
