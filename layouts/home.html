{{ define "content" }}


<!-- Force vertical layout using column -->
<div style="display: flex; flex-direction: column; gap: 4rem; max-width: 1200px; margin: 2rem auto 5rem auto;">

  <!-- Row 1: Welcome Section -->
   <div class="section-card" >
  <div style="display: flex; flex-wrap: wrap; justify-content: space-between; gap: 2rem; ">
    <!-- Left Text -->
    <div style="flex: 1; min-width: 300px;">
      <h2>{{ .Title }}</h2>
      {{ with .Params.intro_paragraphs }}
        {{ range . }}<p>{{ . }}</p>{{ end }}
      {{ end }}
    </div>

    <!-- Right Image -->
    <div style="flex: 1; min-width: 300px; text-align: center;">
      {{ with .Params.intro_image }}
        <img src="{{ . | relURL }}" alt="Intro image"
             style="max-width: 100%; height: auto; border-radius: 12px;" />
      {{ end }}
      {{ with .Params.intro_caption }}
        <p style="font-size: 0.9rem; color: gray;">{{ . }}</p>
      {{ end }}
    </div>
  </div>
  </div>

{{ end }}
